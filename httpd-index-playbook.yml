---
- name: install httpd and create html
  hosts: all
  become: yes
  tasks: 
    - name: install httpd
      yum:
        name: httpd
        state: present
    - name: 
      service:
        name: httpd
        state: started
        enabled: yes
    - name: Create a custom ndex.html
      blockinfile:
        create: yes
        path: /var/www/html/index.html
        block: | 
          Welcome to XfusionCorp!

          This is  Nautilus sample file, created using Ansible!

          Please do not modify this file manually!

        owner: apache
        group: apache
        mode: '0777'


        --------------------------------------------------------------------


        ---
- name: Install and enable httpd service
  hosts: all
  become: yes
  tasks:
    - name: Install httpd
      yum:
        name: httpd
        state: present
    - name: Enable and Start httpd
      service: 
        name: httpd
        state: started
        enabled: yes
