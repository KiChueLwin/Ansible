---
# tasks file for role/test

- name: install the latest version of HTTPD
  yum:
    name: httpd
    state: latest

- name: Start service httpd
  service:
    name: httpd
    state: started

- name: Create a html file by using template module
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: '0644'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
